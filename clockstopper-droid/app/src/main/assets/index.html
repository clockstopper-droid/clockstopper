<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Global Time Clock</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark-theme">

<!-- ═══════════════════════════════════════════════════════════════════════════
     World Clocks
════════════════════════════════════════════════════════════════════════════ -->
<section id="clocks" aria-label="World Clocks">
  <div class="clock-row">
    <span class="clock-label">Eastern</span>
    <span class="clock-time" id="clock-eastern">--:--:-- --</span>
  </div>
  <div class="clock-row">
    <span class="clock-label">Central</span>
    <span class="clock-time" id="clock-central">--:--:-- --</span>
  </div>
  <div class="clock-row">
    <span class="clock-label">Pacific</span>
    <span class="clock-time" id="clock-pacific">--:--:-- --</span>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Theme toggle
════════════════════════════════════════════════════════════════════════════ -->
<div id="controls">
  <button id="themeToggle" aria-label="Toggle dark/light theme">Theme</button>
  <button id="muteBtn" aria-pressed="false">Mute</button>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Overlay permission status & enable button
     ─────────────────────────────────────────
     These elements are always present in the DOM but styled differently
     depending on whether overlay permission is granted, denied, or
     permanently declined.  app.js manages the content and visibility.
════════════════════════════════════════════════════════════════════════════ -->
<section id="overlay-permission-panel" aria-label="Overlay permission">
  <p id="overlayPermissionStatus" class="overlay-status overlay-denied">
    Call overlay: not enabled — you can allow it when prompted.
  </p>
  <!--
    The "Enable overlay" button is shown only when the user has permanently
    declined the permission and needs a manual path back to system settings.
    Initially hidden; app.js reveals it when permanent=true.
  -->
  <button id="enableOverlayBtn" class="overlay-enable-btn" hidden
          aria-label="Open system settings to enable call overlay">
    Enable overlay
  </button>
</section>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Mic permission status
════════════════════════════════════════════════════════════════════════════ -->
<p id="micPermissionStatus" class="mic-permission mic-prompt"
   aria-live="polite">
  Mic: permission will be requested when you dial
</p>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Dialer
════════════════════════════════════════════════════════════════════════════ -->
<section id="dialer" aria-label="Phone dialer">

  <!-- Number being dialed -->
  <div id="dialDisplay" class="dial-display" aria-live="polite" aria-label="Number being dialed"></div>
  <p id="dialReadout" class="dial-readout" aria-live="polite"></p>

  <!-- Caller ID name -->
  <div id="callerIdSection">
    <label for="callerIdInput">Caller ID name:</label>
    <input id="callerIdInput" type="text" placeholder="Your name (optional)" autocomplete="off" />
    <button id="callerIdSave">Save</button>
    <span id="callerIdFeedback" aria-live="polite"></span>
  </div>

  <!-- Dialpad -->
  <div id="dialpad" aria-label="Dialpad">
    <button data-digit="1">1</button>
    <button data-digit="2">2 <sub>ABC</sub></button>
    <button data-digit="3">3 <sub>DEF</sub></button>

    <button data-digit="4">4 <sub>GHI</sub></button>
    <button data-digit="5">5 <sub>JKL</sub></button>
    <button data-digit="6">6 <sub>MNO</sub></button>

    <button data-digit="7">7 <sub>PQRS</sub></button>
    <button data-digit="8">8 <sub>TUV</sub></button>
    <button data-digit="9">9 <sub>WXYZ</sub></button>

    <button data-digit="*">*</button>
    <button data-digit="0">0 <sub>+</sub></button>
    <button data-digit="#">#</button>

    <button id="backspaceBtn" aria-label="Backspace (hold to clear all)">⌫</button>
  </div>

  <!-- Call controls -->
  <div id="callControls">
    <button id="callBtn"    class="call-btn"     aria-label="Call">&#9742;</button>
    <button id="endCallBtn" class="end-call-btn" aria-label="End call">&#128721;</button>
  </div>

  <!-- In-call status and indicators -->
  <p id="callStatus"            aria-live="assertive"></p>
  <p id="networkTypeIndicator"  aria-live="polite"></p>
  <p id="callVolumeIndicator"   aria-live="polite"></p>
  <p id="audioOutputRouteStatus" aria-live="polite"></p>

  <!-- Mic mute (shown during active call) -->
  <button id="micMuteBtn" aria-pressed="false" class="mic-mute-btn">Mute Mic</button>

  <!--
    Overlay-dependent: the call HUD section is only meaningful when
    SYSTEM_ALERT_WINDOW is granted.  Marked with data-overlay-feature so
    app.js can show/hide it based on permission state.
  -->
  <div data-overlay-feature hidden
       id="overlayCallHud"
       class="overlay-call-hud"
       aria-label="Call overlay HUD (requires Display over other apps permission)">
    <p class="overlay-hud-label">📞 Overlay HUD active — visible over other apps</p>
  </div>

</section>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Audio device selector
════════════════════════════════════════════════════════════════════════════ -->
<section id="audioDeviceSection" aria-label="Audio output device">
  <h2>Audio output</h2>
  <ul id="audioDeviceList" aria-label="Available audio output devices">
    <li>Loading devices…</li>
  </ul>
</section>

<!-- ═══════════════════════════════════════════════════════════════════════════
     Connectivity panel
════════════════════════════════════════════════════════════════════════════ -->
<section id="connectivityPanel" aria-label="Network connectivity">
  <p id="connectivityStatus"   class="connectivity-status">Checking…</p>
  <p id="connectivityTimestamp" aria-live="polite"></p>
  <p id="mobileNetworkStatus"  aria-live="polite"></p>
</section>

<script src="js/app.js"></script>
</body>
</html>
