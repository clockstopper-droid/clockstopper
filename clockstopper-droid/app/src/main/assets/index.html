<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Global Time Clock</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark-theme">

  <!-- ═══════════════════════════════════════════════════════
       TOP CONTROLS
  ════════════════════════════════════════════════════════ -->
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">Global Time Clock</h1>
      <div class="header-controls">
        <button id="muteBtn"   class="control-btn mute-btn"  onclick="toggleMute()">🔔 Mute</button>
        <button id="themeBtn"  class="control-btn theme-btn" onclick="toggleTheme()">🌙 Theme</button>
      </div>
    </header>

    <!-- ═══════════════════════════════════════════════════
         CLOCK GRID  (3 fixed zones)
    ════════════════════════════════════════════════════ -->
    <section id="clocksGrid" class="clocks-grid" aria-label="World clocks"></section>

    <!-- ═══════════════════════════════════════════════════
         CONNECTIVITY PANEL
    ════════════════════════════════════════════════════ -->
    <section class="connectivity-panel" id="connectivityPanel">
      <button class="panel-toggle-btn" onclick="toggleConnectivityPanel()">
        <span id="wifiStatus" class="wifi-status">Checking…</span>
        <span class="panel-toggle-arrow">▼</span>
      </button>

      <div class="panel-body">
        <div id="connectivityProbeStatus" class="probe-status">—</div>
        <div id="networkTypeIndicator"    class="network-type-indicator"></div>

        <!-- Mobile network option -->
        <div id="mobileNetworkOption" class="mobile-network-option unavailable">
          <span class="mobile-network-label">📱 Mobile / Cellular</span>
          <button class="mobile-select-btn" onclick="selectMobileNetwork()">Use Mobile</button>
        </div>

        <!-- Network list -->
        <ul id="networkList" class="network-list"></ul>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════
         DIALER  &  CALL PANEL
    ════════════════════════════════════════════════════ -->
    <section id="callPanel" class="call-panel">
      <h2 class="panel-heading">Dialer</h2>

      <!-- ── Caller ID Name ─────────────────────────────── -->
      <div class="caller-id-name-section">
        <label class="caller-id-label" for="callerIdNameInput">Your Caller ID Name</label>
        <p class="caller-id-hint">
          Recipients will see this name on their caller ID instead of your number.
          Type any words you like and tap <strong>Set Name</strong>.
        </p>

        <div class="caller-id-input-row">
          <input
            type="text"
            id="callerIdNameInput"
            class="caller-id-name-input"
            placeholder="e.g. John Smith or Acme Corp"
            maxlength="64"
            autocomplete="off"
            spellcheck="false"
            aria-label="Custom caller ID name"
          />
          <button
            id="setCallerIdNameBtn"
            class="set-caller-id-btn"
            onclick="setCallerIdName()"
            aria-label="Save caller ID name"
          >Set Name</button>
        </div>

        <!-- Live confirmation of what recipients will see -->
        <div id="callerIdNameDisplay" class="caller-id-name-display" aria-live="polite">
          No caller ID name set
        </div>
      </div>

      <!-- ── Dialer display ─────────────────────────────── -->
      <div id="dialerDisplay"       class="dialer-display"        aria-live="polite" aria-label="Number being dialed"></div>
      <div id="dialedNumberReadout" class="dialed-number-readout" aria-live="polite"></div>

      <!-- ── Keypad ─────────────────────────────────────── -->
      <div class="keypad" role="group" aria-label="Dial pad">
        <button class="keypad-btn" onclick="dialDigit('1')"  aria-label="1">1</button>
        <button class="keypad-btn" onclick="dialDigit('2')"  aria-label="2">2</button>
        <button class="keypad-btn" onclick="dialDigit('3')"  aria-label="3">3</button>
        <button class="keypad-btn" onclick="dialDigit('4')"  aria-label="4">4</button>
        <button class="keypad-btn" onclick="dialDigit('5')"  aria-label="5">5</button>
        <button class="keypad-btn" onclick="dialDigit('6')"  aria-label="6">6</button>
        <button class="keypad-btn" onclick="dialDigit('7')"  aria-label="7">7</button>
        <button class="keypad-btn" onclick="dialDigit('8')"  aria-label="8">8</button>
        <button class="keypad-btn" onclick="dialDigit('9')"  aria-label="9">9</button>
        <button class="keypad-btn" onclick="dialDigit('*')"  aria-label="star">*</button>
        <button class="keypad-btn" onclick="dialDigit('0')"  aria-label="0">0</button>
        <button class="keypad-btn" onclick="dialDigit('#')"  aria-label="hash">#</button>
      </div>

      <!-- ── Action row ─────────────────────────────────── -->
      <div class="dialer-actions">
        <button class="keypad-clear-btn keypad-backspace-btn action-btn" onclick="clearDialed(false)" aria-label="Backspace">⌫</button>
        <button class="call-btn action-btn"  onclick="initiateCall()" aria-label="Call">📞 Call</button>
        <button class="end-btn  action-btn"  onclick="endCall()"      aria-label="End call">🔴 End</button>
      </div>

      <!-- ── Status indicators ──────────────────────────── -->
      <div id="callStatus"          class="call-status"           aria-live="polite"></div>
      <div id="micPermissionStatus" class="mic-permission-status" aria-live="polite"></div>
    </section>

  </div><!-- /.container -->

  <script src="js/app.js"></script>
</body>
</html>
