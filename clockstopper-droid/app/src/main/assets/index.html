<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Global Time Clock</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark-theme">

<div id="app">

  <!-- ── Controls bar ─────────────────────────────────────────────────── -->
  <div id="controlsBar">
    <button onclick="toggleTheme()" aria-label="Toggle light/dark theme">
      🌙 Theme
    </button>
    <button id="muteBtn" onclick="toggleMute()" aria-pressed="false" aria-label="Mute audio">
      🔔 Mute
    </button>
  </div>

  <!-- ── Three fixed world clocks ─────────────────────────────────────── -->
  <div id="clocksGrid" role="region" aria-label="World clocks"></div>

  <!-- ── Connectivity panel ───────────────────────────────────────────── -->
  <div id="connectivityPanel" role="region" aria-label="Connectivity">
    <button id="connectivityToggleBtn"
            onclick="toggleConnectivityPanel()"
            aria-expanded="false"
            aria-controls="connectivityPanelBody">
      📶 Network Status ▾
    </button>
    <div id="connectivityPanelBody" aria-live="polite">
      <div id="wifiStatus">Checking network…</div>
      <div id="connectivityProbeStatus">Probing internet…</div>
      <ul id="networkList"></ul>
      <button id="mobileNetworkOption" onclick="selectMobileNetwork()">
        📱 Use Mobile Network
      </button>
    </div>
  </div>

  <!-- ── Call panel ───────────────────────────────────────────────────── -->
  <div id="callPanel" role="region" aria-label="Dialer">

    <!-- Caller ID name -->
    <div class="caller-id-row">
      <input id="callerIdNameInput"
             type="text"
             placeholder="Your caller ID name (optional)"
             aria-label="Caller ID name" />
      <button id="setCallerIdNameBtn"
              onclick="setCallerIdName()"
              class="btn--accent">
        Set
      </button>
    </div>
    <div id="callerIdNameDisplay" aria-live="polite">
      Caller ID: (not set — number will be shown)
    </div>

    <!-- Mic permission status — pre-check result shown here -->
    <!--
      States applied by applyMicPermissionUI():
        .mic-status--granted  → green  "🎤 Microphone: Granted"
        .mic-status--prompt   → amber  "🎤 Microphone: Will ask when you dial"
        .mic-status--denied   → red    "🚫 Microphone access denied…"
    -->
    <div id="micPermissionStatus"
         role="status"
         aria-live="polite"
         aria-atomic="true">
      🎤 Checking microphone permission…
    </div>

    <!-- Dialer number display -->
    <div id="dialerDisplay" aria-label="Number being dialed" aria-live="polite"></div>
    <div id="dialedNumberReadout" aria-live="polite">Enter a number above</div>

    <!-- Keypad -->
    <div id="keypad" role="group" aria-label="Dial keypad">
      <button class="key-btn" onclick="dialDigit('1')"  aria-label="1">1</button>
      <button class="key-btn" onclick="dialDigit('2')"  aria-label="2">2</button>
      <button class="key-btn" onclick="dialDigit('3')"  aria-label="3">3</button>
      <button class="key-btn" onclick="dialDigit('4')"  aria-label="4">4</button>
      <button class="key-btn" onclick="dialDigit('5')"  aria-label="5">5</button>
      <button class="key-btn" onclick="dialDigit('6')"  aria-label="6">6</button>
      <button class="key-btn" onclick="dialDigit('7')"  aria-label="7">7</button>
      <button class="key-btn" onclick="dialDigit('8')"  aria-label="8">8</button>
      <button class="key-btn" onclick="dialDigit('9')"  aria-label="9">9</button>
      <button class="key-btn" onclick="dialDigit('*')"  aria-label="Star">*</button>
      <button class="key-btn" onclick="dialDigit('0')"  aria-label="0">0</button>
      <button class="key-btn" onclick="dialDigit('#')"  aria-label="Hash">#</button>
      <button class="key-btn" onclick="dialDigit('+')"  aria-label="Plus" style="grid-column:1">+</button>
      <button class="key-btn" onclick="clearDialed()"   aria-label="Backspace"
              style="grid-column:3">⌫</button>
    </div>

    <!-- Call / End buttons -->
    <div class="call-actions">
      <!--
        #callBtn receives .btn--disabled when mic permission is 'denied'.
        aria-disabled is toggled in applyMicPermissionUI() to communicate
        the disabled state to assistive technologies.
      -->
      <button id="callBtn"
              class="btn--accent"
              onclick="initiateCall()"
              aria-label="Place call"
              aria-disabled="false">
        📞 Call
      </button>
      <button id="endCallBtn"
              onclick="endCall()"
              aria-label="End call">
        📵 End
      </button>
    </div>

    <!-- Live call status + duration timer -->
    <div id="callStatus" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- Active network indicator (shown during a call) -->
    <div id="networkTypeIndicator" aria-live="polite"></div>

  </div><!-- /#callPanel -->

</div><!-- /#app -->

<script src="js/app.js"></script>
</body>
</html>
