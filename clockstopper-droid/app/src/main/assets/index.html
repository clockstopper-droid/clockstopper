<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Time Clock</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark">

  <!-- ── Controls ─────────────────────────────────────────── -->
  <div id="controls">
    <button id="themeToggle">☀ Light Mode</button>
    <button id="muteBtn" data-muted="false">🔔 Mute</button>
  </div>

  <!-- ── World Clocks ──────────────────────────────────────── -->
  <section id="clocksPanel">
    <div class="clock-card">
      <span class="clock-label">Eastern</span>
      <span class="clock-time" id="clockEastern">--:--:-- --</span>
    </div>
    <div class="clock-card">
      <span class="clock-label">Central</span>
      <span class="clock-time" id="clockCentral">--:--:-- --</span>
    </div>
    <div class="clock-card">
      <span class="clock-label">Pacific</span>
      <span class="clock-time" id="clockWestern">--:--:-- --</span>
    </div>
  </section>

  <!-- ── Connectivity Panel ────────────────────────────────── -->
  <section id="connectivityPanel">
    <div id="networkInfo">Network: detecting…</div>
    <div id="connectivityStatus">Checking…</div>
    <div id="connectivityTimestamp"></div>

    <!-- Mobile network option (shown only when cellular detected) -->
    <div id="mobileNetworkOption" style="display:none">
      <button id="mobileNetworkBtn">📶 Mobile Network: OFF</button>
    </div>
  </section>

  <!-- ── Mic Permission Status ─────────────────────────────── -->
  <div id="micPermissionStatus" class="mic-status mic-prompt">
    🎤 Microphone: checking…
  </div>

  <!-- ── Caller ID Name ────────────────────────────────────── -->
  <section id="callerIdSection">
    <label for="callerIdInput">Caller ID Name:</label>
    <input id="callerIdInput" type="text" placeholder="Your display name" />
    <button id="saveCallerIdBtn">Save</button>
    <div id="callerIdDisplay">Caller ID: (not set)</div>
  </section>

  <!-- ── Dialer ─────────────────────────────────────────────── -->
  <section id="dialerSection">
    <!-- Number display box -->
    <div id="dialDisplay" class="dial-display"></div>
    <!-- Live readout -->
    <div id="dialReadout" class="dial-readout">Enter a number</div>

    <!-- Keypad -->
    <div id="keypad">
      <button class="dial-key" data-digit="1">1</button>
      <button class="dial-key" data-digit="2">2</button>
      <button class="dial-key" data-digit="3">3</button>
      <button class="dial-key" data-digit="4">4</button>
      <button class="dial-key" data-digit="5">5</button>
      <button class="dial-key" data-digit="6">6</button>
      <button class="dial-key" data-digit="7">7</button>
      <button class="dial-key" data-digit="8">8</button>
      <button class="dial-key" data-digit="9">9</button>
      <button class="dial-key" data-digit="*">*</button>
      <button class="dial-key" data-digit="0">0</button>
      <button class="dial-key" data-digit="#">#</button>
      <button class="dial-key" data-digit="+">+</button>
      <button id="backspaceBtn" class="dial-key">⌫</button>
    </div>

    <!-- Call controls -->
    <div id="callControls">
      <button id="callBtn">📞 Call</button>
      <button id="endCallBtn">🔴 End</button>
    </div>

    <!-- Call status / duration timer -->
    <div id="callStatus"></div>

    <!-- Active-call info row -->
    <div id="callInfoRow">
      <span id="networkTypeIndicator" style="display:none"></span>
      <span id="callVolumeIndicator"  style="display:none"></span>
    </div>

    <!-- ── Mic Mute Controls (visible only during active call) ── -->
    <div id="micMuteControls" style="display:none">
      <button id="micMuteBtn" aria-pressed="false">🎙️ Mute Mic</button>
      <span   id="micMuteStatus" class="mic-mute-status live">Mic live 🔴</span>
    </div>

  </section>

  <script src="js/app.js"></script>
</body>
</html>
