<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Time Clock</title>
  <link rel="stylesheet" href="Css/Style.css" />
</head>
<body class="dark">

<div class="app-container">

  <!-- ── Top bar ────────────────────────────────────────── -->
  <div class="top-bar">
    <button id="themeToggle" class="btn-secondary">☀ Light Mode</button>
  </div>

  <!-- ── World clocks ───────────────────────────────────── -->
  <section class="clocks-section" aria-label="World clocks">
    <div class="clock-card">
      <span class="clock-label">Eastern</span>
      <span class="clock-time" id="clockEastern">--:--:-- --</span>
    </div>
    <div class="clock-card">
      <span class="clock-label">Central</span>
      <span class="clock-time" id="clockCentral">--:--:-- --</span>
    </div>
    <div class="clock-card">
      <span class="clock-label">Pacific</span>
      <span class="clock-time" id="clockWestern">--:--:-- --</span>
    </div>
  </section>

  <!-- ── Connectivity panel ─────────────────────────────── -->
  <section class="connectivity-panel" aria-label="Connectivity status">
    <div>
      <span id="connectivityStatus">Checking…</span>
      <span id="connectivityTimestamp"></span>
    </div>
    <div id="networkInfo"></div>
    <div id="mobileNetworkOption">
      <button id="mobileNetworkBtn" class="btn-secondary">📶 Mobile Network: OFF</button>
    </div>
  </section>

  <!-- ── Microphone permission status ───────────────────── -->
  <div id="micPermissionStatus" class="mic-status">
    🎤 Microphone: Checking…
  </div>

  <!-- ── Caller ID name ─────────────────────────────────── -->
  <section class="caller-id-section" aria-label="Caller ID name">
    <label for="callerIdInput" style="font-size:0.85rem;opacity:0.7;">Caller ID Name</label>
    <input id="callerIdInput" type="text"
           placeholder="Enter your display name…"
           autocomplete="off" />
    <button id="saveCallerIdBtn" class="btn-primary">Save Name</button>
    <div id="callerIdDisplay">Caller ID: (not set)</div>
  </section>

  <!-- ── Dial display ───────────────────────────────────── -->
  <div id="dialDisplay" aria-label="Number being dialed" aria-live="polite"> </div>
  <div id="dialReadout" aria-live="polite">Enter a number</div>

  <!-- ── Call status / timer ────────────────────────────── -->
  <div style="display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;">
    <span id="callStatus" aria-live="assertive"></span>
    <span id="networkTypeIndicator" aria-label="Active network type"></span>
    <span id="callVolumeIndicator" aria-label="Call volume"></span>
  </div>

  <!-- ── Mic mute controls (in-call only) ───────────────── -->
  <div id="micMuteControls" role="group" aria-label="Microphone mute control">
    <button id="micMuteBtn"
            aria-pressed="false"
            title="Mute / unmute microphone (keyboard shortcut: M)">
      🎙️ Mute Mic
    </button>
    <span id="micMuteStatus" class="mic-mute-status live">Mic live 🔴</span>
  </div>

  <!-- ══════════════════════════════════════════════════════
       GLASS DIAL PAD
       ══════════════════════════════════════════════════════ -->
  <div class="dial-pad" role="group" aria-label="Phone dial pad">

    <button class="dial-key" data-digit="1" aria-label="1">1</button>
    <button class="dial-key" data-digit="2" aria-label="2">2</button>
    <button class="dial-key" data-digit="3" aria-label="3">3</button>

    <button class="dial-key" data-digit="4" aria-label="4">4</button>
    <button class="dial-key" data-digit="5" aria-label="5">5</button>
    <button class="dial-key" data-digit="6" aria-label="6">6</button>

    <button class="dial-key" data-digit="7" aria-label="7">7</button>
    <button class="dial-key" data-digit="8" aria-label="8">8</button>
    <button class="dial-key" data-digit="9" aria-label="9">9</button>

    <button class="dial-key" data-digit="*" aria-label="star">*</button>
    <button class="dial-key" data-digit="0" aria-label="0">0</button>
    <button class="dial-key" data-digit="#" aria-label="hash">#</button>

    <button class="dial-key" data-digit="+" aria-label="plus">+</button>
    <button class="dial-key" id="backspaceBtn" aria-label="Backspace — hold to clear all">⌫</button>
    <button class="dial-key" id="muteBtn" aria-pressed="false" title="Mute / unmute audio alerts">
      🔔 Mute
    </button>

    <button class="dial-key" id="callBtn" aria-label="Call">📞 Call</button>
    <button class="dial-key" id="endCallBtn" aria-label="End call">🔴 End</button>

  </div>

</div><!-- /app-container -->

<script src="js/app.js"></script>
</body>
</html>
