<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Time Clock</title>
  <link rel="stylesheet" href="Css/Style.css" />
</head>
<body class="dark-theme">

  <!-- ── Clock Panel ─────────────────────────────────────────────────── -->
  <section id="clockPanel">
    <div id="clockContainer"></div>
  </section>

  <!-- ── Connectivity Panel ──────────────────────────────────────────── -->
  <section id="connectivityPanel">
    <h2>Network</h2>
    <div id="connectivityStatus" class="status-online">Checking…</div>
    <button onclick="probeConnectivity()">Check Connection</button>
  </section>

  <!-- ── Microphone Permission Status ────────────────────────────────── -->
  <div id="micPermissionStatus" class="mic-status mic-unknown">
    Checking microphone permission…
  </div>

  <!-- ── Caller ID Name ──────────────────────────────────────────────── -->
  <section id="callerIdPanel">
    <h2>Caller ID Name</h2>
    <input type="text" id="callerIdNameInput" placeholder="Your display name for recipients" />
    <button id="setCallerIdNameBtn">Save</button>
    <div id="callerIdNameDisplay">No caller ID name set.</div>
  </section>

  <!-- ── Dialer ───────────────────────────────────────────────────────── -->
  <section id="callPanel">
    <!-- Number display box -->
    <div id="dialerDisplay" class="dialer-display"></div>
    <!-- Live readout beneath display -->
    <div id="dialReadout" class="dial-readout"></div>

    <!-- Keypad -->
    <div id="keypad">
      <button class="key-btn" onclick="dialDigit('1')">1</button>
      <button class="key-btn" onclick="dialDigit('2')">2</button>
      <button class="key-btn" onclick="dialDigit('3')">3</button>
      <button class="key-btn" onclick="dialDigit('4')">4</button>
      <button class="key-btn" onclick="dialDigit('5')">5</button>
      <button class="key-btn" onclick="dialDigit('6')">6</button>
      <button class="key-btn" onclick="dialDigit('7')">7</button>
      <button class="key-btn" onclick="dialDigit('8')">8</button>
      <button class="key-btn" onclick="dialDigit('9')">9</button>
      <button class="key-btn" onclick="dialDigit('*')">*</button>
      <button class="key-btn" onclick="dialDigit('0')">0</button>
      <button class="key-btn" onclick="dialDigit('#')">#</button>
    </div>

    <!-- Backspace — NO onclick; long-press handler wired in app.js -->
    <button id="backspaceBtn" class="key-btn backspace-btn" aria-label="Backspace">⌫</button>

    <!-- Call controls -->
    <div id="callControls">
      <button id="callBtn"    onclick="initiateCall()">Call</button>
      <button id="endCallBtn" onclick="endCall()">End</button>
    </div>

    <!-- Status / call duration timer -->
    <div id="callStatus"></div>

    <!-- Network type badge (visible during active call only) -->
    <span id="networkTypeIndicator" style="display:none;"></span>
  </section>

  <!-- ── Controls ─────────────────────────────────────────────────────── -->
  <section id="controls">
    <button id="muteBtn"  onclick="toggleMute()">Mute</button>
    <button id="themeBtn" onclick="toggleTheme()">Toggle Theme</button>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
