<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Time Clock — Test Suite</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #e0e0e0; padding: 1.5rem; }
    h1   { color: #ff8c00; margin-bottom: 1rem; }
    h2   { color: #aaa; font-size: 0.9rem; margin: 1.25rem 0 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }

    #summary { margin-bottom: 1.5rem; font-size: 1.1rem; }
    #summary .pass { color: #4caf50; }
    #summary .fail { color: #f44336; }

    .test-result          { padding: 0.3rem 0.5rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .test-result.passed   { background: rgba(76,175,80,0.12);  color: #4caf50; }
    .test-result.failed   { background: rgba(244,67,54,0.12);  color: #f44336; }
    .test-result .name    { font-weight: 600; }
    .test-result .message { margin-left: 1rem; font-size: 0.8rem; opacity: 0.85; }

    #results-container { max-width: 860px; }
  </style>
</head>
<body>
  <h1>Global Time Clock — Feature Test Suite</h1>
  <div id="summary">Running tests…</div>
  <div id="results-container"></div>

  <!-- Test runner must load first -->
  <script src="runner.js"></script>

  <!-- Feature test files — one per major app feature -->
  <script src="features/clocks.test.js"></script>
  <script src="features/theme.test.js"></script>
  <script src="features/mute.test.js"></script>
  <script src="features/dialer.test.js"></script>
  <script src="features/backspace.test.js"></script>
  <script src="features/callerIdName.test.js"></script>
  <script src="features/callDurationTimer.test.js"></script>
  <script src="features/networkTypeBadge.test.js"></script>
  <script src="features/micPermission.test.js"></script>
  <script src="features/connectivity.test.js"></script>
  <script src="features/mobileNetwork.test.js"></script>
  <script src="features/callVolume.test.js"></script>
  <script src="features/callAudio.test.js"></script>
  <script src="features/micMute.test.js"></script>
  <script src="features/audioRouting.test.js"></script>

  <!--
    Overlay permission tests — covers the SYSTEM_ALERT_WINDOW permission
    state management, graceful degradation, enable button, and
    overlayPermissionChanged CustomEvent handling.
  -->
  <script src="features/overlayPermission.test.js"></script>

  <!-- Trigger final summary render after all test files have run -->
  <script>RUNNER.finish();</script>
</body>
</html>
