<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Time Clock</title>
  <!-- Old English / Blackletter font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Css/Style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       ANONYMOUS HEADER — Bold Old English, centered
  ════════════════════════════════════════════════ -->
  <header class="anonymous-header">
    <h1 class="anonymous-title">Anonymous</h1>
  </header>

  <div class="container">

    <!-- ═══════════════════════════════════════════
         CONTROLS (theme toggle only — no add/mute)
    ════════════════════════════════════════════ -->
    <div class="controls">
      <button id="themeBtn" onclick="toggleTheme()">🌙 Dark Mode</button>
    </div>

    <!-- ═══════════════════════════════════════════
         US TIME ZONE CLOCKS
    ════════════════════════════════════════════ -->
    <h2 class="section-title">US Time Zones</h2>
    <div class="clocks-grid" id="clocksGrid"></div>

    <!-- ═══════════════════════════════════════════
         CONNECTIVITY PANEL
    ════════════════════════════════════════════ -->
    <div class="connectivity-panel" id="connectivityPanel">
      <div class="connectivity-header" onclick="toggleConnectivityPanel()">
        <span>🌐 Network Status</span>
        <span class="panel-chevron" id="panelChevron">▼</span>
      </div>
      <div class="connectivity-body">
        <div class="wifi-status" id="wifiStatus">Checking…</div>
      </div>
    </div>

  </div><!-- /.container -->

  <script src="js/app.js"></script>
</body>
</html>
