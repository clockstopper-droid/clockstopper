<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Time Clock</title>
  <link rel="stylesheet" href="Css/Style.css" />
</head>
<body>

  <div class="container">
    <h1>🌍 Global Time Clock</h1>

    <!-- ── Clock grid ─────────────────────────────────────────────────── -->
    <div id="clocksGrid" class="clocks-grid"></div>

    <!-- ── Controls ──────────────────────────────────────────────────── -->
    <div class="controls">
      <input
        type="text"
        id="tzInput"
        placeholder="e.g. America/Chicago"
        aria-label="IANA time zone"
      />
      <button onclick="addTimezone()">➕ Add Clock</button>
      <button id="themeBtn" onclick="toggleTheme()">🌙 Dark Mode</button>
      <button id="muteBtn"  class="mute-btn" onclick="toggleMute()">🔔 Mute</button>
    </div>

    <!-- ── Connectivity panel ─────────────────────────────────────────── -->
    <!--
      #wifiStatus is populated entirely by renderConnectivityPanel() in app.js.
      It shows:
        • Overall online / offline / degraded status (via CSS classes)
        • Connection type from the Network Information API (wifi, cellular, …)
        • Effective speed class (4G / 3G / 2G / slow-2G) where available
        • Estimated downlink speed and round-trip latency
        • Data Saver mode flag
        • Actual internet reachability confirmed by a lightweight fetch probe
        • A manual Re-check button

      NOTE: The Network Information API (navigator.connection) is supported in
      Chromium-based browsers (Chrome, Edge, Samsung Internet, Opera) and
      Android WebView.  It is NOT supported in Safari or Firefox.  The panel
      degrades gracefully: connection-type rows are simply omitted when the
      API is unavailable, and an informational note is shown instead.

      Routing traffic through a specific network interface (e.g. forcing Wi-Fi
      vs. cellular) is an OS-level operation and is not accessible from a web
      page — no browser API exposes that capability.  This panel focuses on
      what is genuinely possible: surfacing the connection the OS has already
      chosen and verifying actual internet reachability.
    -->
    <section class="conn-panel-wrapper" aria-label="Network connectivity status">
      <h2 class="conn-panel-title">📡 Network Status</h2>
      <div id="wifiStatus" class="wifi-status" role="status" aria-live="polite">
        <span class="conn-status-text">Detecting…</span>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
