<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Time Clock</title>
  <link rel="stylesheet" href="Css/Style.css" />
</head>
<body>
  <div class="container">
    <div class="header-bar">
      <h1>🌍 Global Time Clock</h1>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light mode">
        🌙
      </button>
    </div>

    <div class="controls">
      <input
        type="text"
        id="tzInput"
        placeholder="e.g. America/New_York"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-add" onclick="addTimezone()">Add Clock</button>
    </div>

    <div id="clocksGrid" class="clocks-grid"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
